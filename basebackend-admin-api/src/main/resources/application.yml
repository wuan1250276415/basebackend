server:
  port: 8082

spring:
  application:
    name: admin-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ========== Spring Config Import (替代 bootstrap.yml) ==========
  config:
    import:
      - optional:nacos:common-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:mysql-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:redis-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:rocketmq-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:observability-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:security-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:seata-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:${spring.application.name}.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - classpath:application-feature-toggle.yml
      - classpath:application-observability.yml
      - classpath:application-database.yml

  # ========== Spring Cloud 集成配置 ==========
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:192.168.66.126:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        # 元数据配置（用于灰度发布）
        metadata:
          version: ${APP_VERSION:1.0.0}
          environment: ${SPRING_PROFILES_ACTIVE:dev}
          gray: ${GRAY_ENABLED:false}
      config:
        server-addr: ${NACOS_SERVER_ADDR:192.168.66.126:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yml
        # 共享配置（所有微服务共享的基础配置）
        shared-configs:
          - data-id: common-config.yml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: mysql-config.yml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: redis-config.yml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: rocketmq-config.yml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: observability-config.yml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: security-config.yml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: seata-config.yml
            group: DEFAULT_GROUP
            refresh: true
        # 扩展配置（模块特有配置）
        extension-configs:
          - data-id: ${spring.application.name}-${spring.profiles.active}.yml
            group: ${NACOS_GROUP:DEFAULT_GROUP}
            refresh: true
    alibaba:
      seata:
        tx-service-group: basebackend-seata-group  # 必须与 seata.tx-service-group 一致

  # Flyway数据库迁移配置
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    table: flyway_schema_history
    encoding: UTF-8
    validate-on-migrate: true
    clean-disabled: true  # 禁用clean防止误删数据
    out-of-order: false
    placeholder-replacement: true
    placeholders:
      env: ${spring.profiles.active}

  # 邮件配置
  mail:
    host: smtp-mail.outlook.com
    port: 587
    username: wuan1250276415@outlook.com
    password: wuanfuck321.
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          timeout: 5000

  # Thymeleaf配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# 日志配置
logging:
  level:
    com.basebackend.admin: debug
    org.springframework.security: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# Knife4j配置
knife4j:
  enable: true
  openapi:
    title: 后台管理系统API
    description: 基于RBAC权限模型的后台管理系统
    version: 1.0.0
    concat: admin@basebackend.com
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表

# 消息配置
messaging:
  # RocketMQ配置
  rocketmq:
    enabled: true
    default-topic: basebackend-topic
    topic-prefix: basebackend.

  # 重试配置
  retry:
    enabled: true
    max-attempts: 16
    # RocketMQ延迟级别：1s 5s 10s 30s 1m 2m 3m 4m 5m 6m 7m 8m 9m 10m 20m 30m 1h 2h

  # 死信队列配置
  dead-letter:
    enabled: true
    topic: basebackend-dlq-topic
    consumer-group: basebackend-dlq-consumer-group

  # 事务消息配置
  transaction:
    enabled: true
    table-name: sys_message_log
    check-interval: 60
    timeout: 30

  # 幂等性配置
  idempotency:
    enabled: true
    expire-time: 3600
    key-prefix: "msg:idempotent:"

# Spring RocketMQ配置
rocketmq:
  name-server: 192.168.66.126:9876
  producer:
    group: basebackend-producer-group
    send-message-timeout: 3000
    compress-message-body-threshold: 4096
    max-message-size: 4194304
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
    retry-next-server: false
  consumer:
    group: basebackend-consumer-group
    consume-timeout: 15

# ================================================================================================
# Seata 分布式事务配置
# ================================================================================================
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: basebackend-seata-group
  enable-auto-data-source-proxy: true
  data-source-proxy-mode: AT
  client:
    rm:
      async-commit-buffer-limit: 10000
      report-retry-count: 5
      table-meta-check-enable: true
      report-success-enable: false
      saga-branch-register-enable: false
      saga-json-parser: fastjson
      lock:
        retry-interval: 10
        retry-times: 30
        retry-policy-branch-rollback-on-conflict: true
    tm:
      commit-retry-count: 5
      rollback-retry-count: 5
      default-global-transaction-timeout: 60000
      degrade-check: false
      degrade-check-period: 2000
      degrade-check-allow-times: 10
    undo:
      data-validation: true
      log-serialization: jackson
      log-table: undo_log
      only-care-update-columns: true
      compress:
        enable: true
        type: zip
        threshold: 64k
  service:
    vgroup-mapping:
      basebackend-seata-group: default
    grouplist:
      default: 192.168.66.126:8091
    enable-degrade: false
    disable-global-transaction: false
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: 192.168.66.126:8848
      namespace: public
      group: SEATA_GROUP
      username: nacos
      password: nacos
  config:
    type: file
