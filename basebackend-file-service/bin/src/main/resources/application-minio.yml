# MinIO对象存储配置
minio:
  # 是否启用MinIO
  enabled: true

  # MinIO服务地址
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}

  # Access Key（从环境变量注入，禁止硬编码）
  access-key: ${MINIO_ACCESS_KEY}

  # Secret Key（从环境变量注入，禁止硬编码）
  secret-key: ${MINIO_SECRET_KEY}

  # 默认存储桶
  bucket-name: ${MINIO_BUCKET_NAME:basebackend}

  # 文件路径配置
  path-prefix: files
  image-path: images
  large-path: large
  thumbnail-path: thumbnails

  # 文件大小限制
  max-file-size: 100  # MB
  large-file-threshold: 10  # MB，超过此大小使用分片上传
  part-size: 5  # MB，分片大小

  # 图片处理配置
  thumbnail-width: 200
  thumbnail-height: 200
  image-quality: 0.8
