spring:
  application:
    name: basebackend-user-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  main:
    # 已通过@Lazy注解和ObjectProvider解决循环依赖，不再需要此配置
    # allow-circular-references: true
    # Bean覆盖仅在必要时启用，用于覆盖自动配置的Bean
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - com.basebackend.observability.otel.config.OtelAutoConfiguration
      - com.basebackend.observability.otel.config.BridgeConfiguration

  # ========== Spring Config Import (替代 bootstrap.yml) ==========
  config:
    import:
      - optional:nacos:common-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:mysql-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:observability-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:redis-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:rocketmq-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:seata-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:backup-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:security-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:application-web-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:${spring.application.name}.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true

  # ========== Spring Cloud 集成配置 ==========
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_DISCOVERY_SERVER:192.168.66.126:8848}
        namespace: ${NACOS_DISCOVERY_NAMESPACE:public}
        group: ${NACOS_DISCOVERY_GROUP:DEFAULT_GROUP}
        username: ${NACOS_DISCOVERY_USERNAME:nacos}
        password: ${NACOS_DISCOVERY_PASSWORD:nacos}
        weight: ${NACOS_DISCOVERY_WEIGHT:1.0}
        cluster: ${NACOS_DISCOVERY_CLUSTER:DEFAULT}
        service-name: ${spring.application.name}
        ip: ${NACOS_DISCOVERY_IP:192.168.66.126}
        port: ${NACOS_DISCOVERY_PORT:${server.port:8081}}
        metadata:
          version: ${APP_VERSION:1.0.0}
          region: ${APP_REGION:beijing}
          zone: ${APP_ZONE:zone-a}
      config:
        server-addr: ${NACOS_CONFIG_SERVER:192.168.66.126:8848}
        namespace: ${NACOS_CONFIG_NAMESPACE:public}
        group: ${NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        username: ${NACOS_CONFIG_USERNAME:nacos}
        password: ${NACOS_CONFIG_PASSWORD:nacos}
        file-extension: ${NACOS_CONFIG_FILE_EXTENSION:yml}
        refresh-enabled: ${NACOS_CONFIG_REFRESH_ENABLED:true}
        shared-configs:
          - data-id: common-config.yml
            refresh: true
          - data-id: mysql-config.yml
            refresh: true
          - data-id: observability-config.yml
            refresh: true
          - data-id: redis-config.yml
            refresh: true
          - data-id: rocketmq-config.yml
            refresh: true
          - data-id: seata-config.yml
            refresh: true
          - data-id: backup-config.yml
            refresh: true
          - data-id: security-config.yml
            refresh: true
          - data-id: application-web-config.yml
            refresh: true
        extension-configs:
          - data-id: ${spring.application.name}-${spring.profiles.active}.yml
            group: ${NACOS_GROUP:DEFAULT_GROUP}
            refresh: true

server:
  port: 8081

# Database enhanced features configuration
database:
  enhanced:
    # Disable multi-tenancy to avoid circular dependency
    multi-tenancy:
      enabled: false
    # Disable SQL statistics to avoid circular dependency
    sql-statistics:
      enabled: false

# Knife4j配置
knife4j:
  enable: true
  openapi:
    title: 后台管理系统API
    description: 基于RBAC权限模型的后台管理系统
    version: 1.0.0
    concat: admin@basebackend.com
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表
