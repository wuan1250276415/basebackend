spring:
  threads:
    virtual:
      enabled: true  # Java 21+ 虚拟线程：Tomcat、@Async、TaskExecutor 全部使用虚拟线程
  # Redis 开发兜底配置（生产环境应从 Nacos redis-config.yml 获取）
  data:
    redis:
      host: ${REDIS_HOST:192.168.66.126}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_TChiFW}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000ms}
      lettuce:
        pool:
          max-active: ${REDIS_MAX_ACTIVE:20}
          max-wait: ${REDIS_MAX_WAIT:2000ms}
          max-idle: ${REDIS_MAX_IDLE:10}
          min-idle: ${REDIS_MIN_IDLE:5}
        shutdown-timeout: 100ms
  # Redisson 配置（Redisson 4.x 使用 spring.redis.redisson 路径）
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://${REDIS_HOST:192.168.66.126}:${REDIS_PORT:6379}"
          password: "${REDIS_PASSWORD:redis_TChiFW}"
          database: ${REDIS_DATABASE:0}
          connectionMinimumIdleSize: 5
          connectionPoolSize: 20
          timeout: 5000
  application:
    name: basebackend-system-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # 邮件配置 - 敏感信息通过环境变量或配置中心获取
  mail:
    host: ${MAIL_HOST:smtp-mail.outlook.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          timeout: 5000

  # ========== Spring Config Import (替代 bootstrap.yml) ==========
  config:
    import:
      - optional:nacos:common-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:mysql-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:redis-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:seata-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:security-config.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:${spring.application.name}.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml?group=${NACOS_CONFIG_GROUP:DEFAULT_GROUP}&refreshEnabled=true

  # ========== Spring Cloud 集成配置 ==========
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_DISCOVERY_SERVER:192.168.66.126:8848}
        namespace: ${NACOS_DISCOVERY_NAMESPACE:public}
        group: ${NACOS_DISCOVERY_GROUP:DEFAULT_GROUP}
        username: ${NACOS_DISCOVERY_USERNAME:nacos}
        password: ${NACOS_DISCOVERY_PASSWORD:nacos}
        weight: ${NACOS_DISCOVERY_WEIGHT:1.0}
        cluster: ${NACOS_DISCOVERY_CLUSTER:DEFAULT}
        service-name: ${spring.application.name}
        # 默认留空，交给 Nacos 自动探测当前实例地址，避免写死开发机 IP
        ip: ${NACOS_DISCOVERY_IP:}
        port: ${NACOS_DISCOVERY_PORT:${server.port:8082}}
        metadata:
          version: ${APP_VERSION:1.0.0}
          region: ${APP_REGION:beijing}
          zone: ${APP_ZONE:zone-a}
      config:
        server-addr: ${NACOS_CONFIG_SERVER:192.168.66.126:8848}
        namespace: ${NACOS_CONFIG_NAMESPACE:public}
        group: ${NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        username: ${NACOS_CONFIG_USERNAME:nacos}
        password: ${NACOS_CONFIG_PASSWORD:nacos}
        file-extension: ${NACOS_CONFIG_FILE_EXTENSION:yml}
        refresh-enabled: ${NACOS_CONFIG_REFRESH_ENABLED:true}
        import-check:
          enabled: false
server:
  port: 8082


nacos:
  config:
    enabled: true
    server-addr: ${spring.cloud.nacos.config.server-addr}
    namespace: ${spring.cloud.nacos.config.namespace}
    group: ${spring.cloud.nacos.config.group}
    username: ${spring.cloud.nacos.config.username}
    password: ${spring.cloud.nacos.config.password}
  discovery:
    enabled: true
    server-addr: ${spring.cloud.nacos.discovery.server-addr}
    namespace: ${spring.cloud.nacos.discovery.namespace}
    group: ${spring.cloud.nacos.discovery.group}
    service-name: ${spring.cloud.nacos.discovery.service-name}
    username: ${spring.cloud.nacos.discovery.username}
    password: ${spring.cloud.nacos.discovery.password}


rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:192.168.66.126:9876}
  producer:
    group: basebackend-producer-group
    send-message-timeout: 3000
    compress-message-body-threshold: 4096
    max-message-size: 4194304  # 4MB
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
    retry-next-server: false
  consumer:
    group: basebackend-consumer-group
    consume-timeout: 15

# 消息配置
messaging:
  management:
    enabled: true

  # RocketMQ 配置
  rocketmq:
    enabled: true
    default-topic: basebackend-topic
    topic-prefix: basebackend.

  # 重试配置
  retry:
    enabled: true
    max-attempts: 16
    # RocketMQ 延迟级别：1s 5s 10s 30s 1m 2m 3m 4m 5m 6m 7m 8m 9m 10m 20m 30m 1h 2h

  # 死信队列配置
  dead-letter:
    enabled: true
    topic: basebackend-dlq-topic
    consumer-group: basebackend-dlq-consumer-group

  # 事务消息配置
  transaction:
    enabled: true
    table-name: sys_message_log
    check-interval: 60
    timeout: 30

  # 幂等性配置
  idempotency:
    enabled: true
    expire-time: 3600
    key-prefix: "msg:idempotent:"
