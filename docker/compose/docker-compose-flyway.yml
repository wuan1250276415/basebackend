# Flyway 数据库迁移入口
# 用途：在 MySQL 已经启动后，统一执行当前开发主链的数据库迁移

networks:
  basebackend-network:
    external: true
    name: basebackend-network

services:
  flyway:
    image: flyway/flyway:10
    container_name: basebackend-flyway
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:mysql://${MYSQL_HOST:-mysql}:${MYSQL_PORT:-3306}/${MYSQL_DATABASE:-basebackend_admin}?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
      FLYWAY_USER: ${MYSQL_USERNAME:-basebackend_admin}
      FLYWAY_PASSWORD: ${MYSQL_PASSWORD:-basebackend123}
      FLYWAY_CONNECT_RETRIES: "60"
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_BASELINE_VERSION: "0"
      FLYWAY_VALIDATE_ON_MIGRATE: "true"
      FLYWAY_CLEAN_DISABLED: "true"
      FLYWAY_TABLE: flyway_schema_history
    command: -locations=filesystem:/flyway/sql/local,filesystem:/flyway/sql/shared migrate
    volumes:
      - ../flyway/sql:/flyway/sql/local:ro
      - ../../../basebackend-database/database-migration/src/main/resources/db/migration/mysql:/flyway/sql/shared:ro
    networks:
      - basebackend-network
    restart: "no"
