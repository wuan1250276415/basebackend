name: CI - Build and Test

on:
  push:
    branches:
      - main
      - 'refactor/**'
      - 'feat/**'
      - 'feature/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: '25'
  MAVEN_OPTS: '-Xmx2048m -XX:MaxMetaspaceSize=512m'

jobs:
  # ==========================================
  # 编译 + 测试
  # ==========================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile
        run: mvn clean compile -B -DskipTests

      - name: Run Tests
        run: mvn test -B -DforkCount=1

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ==========================================
  # 依赖安全扫描（仅 main / PR）
  # ==========================================
  dependency-check:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:aggregate \
            -DfailBuildOnCVSS=9 \
            -DskipTestScope=true \
            -B
        continue-on-error: true

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report/
          retention-days: 30

  # ==========================================
  # 构建各微服务 JAR
  # ==========================================
  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-and-test]
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service:
          - basebackend-gateway
          - basebackend-user-api
          - basebackend-system-api
          - basebackend-file-service
          - basebackend-notification-service
          - basebackend-observability-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build ${{ matrix.service }}
        run: mvn clean package -pl ${{ matrix.service }} -am -DskipTests -B

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 7

  # ==========================================
  # 总结
  # ==========================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, build-services]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Services | ${{ needs.build-services.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.build-and-test.result }}" == "failure" ]] || \
             [[ "${{ needs.build-services.result }}" == "failure" ]]; then
            echo "❌ **CI Failed**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **CI Passed** — Java 25 + Spring Boot 4.0.3" >> $GITHUB_STEP_SUMMARY
          fi
