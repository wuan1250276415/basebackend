name: CI - Segmented Build and Verify

on:
  push:
    branches:
      - main
      - 'refactor/**'
      - 'feat/**'
      - 'feature/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: '25'
  MAVEN_OPTS: '-Xmx2048m -XX:MaxMetaspaceSize=512m'

jobs:
  # ==========================================
  # 编译 + 测试
  # ==========================================
  build-and-verify:
    name: Segmented Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      plan_count: ${{ steps.segmented-plan-meta.outputs.plan_count }}
      plan_first: ${{ steps.segmented-plan-meta.outputs.plan_first }}
      plan_last: ${{ steps.segmented-plan-meta.outputs.plan_last }}
      executed_count: ${{ steps.segmented-verify-run.outputs.executed_count }}
      verify_exit_code: ${{ steps.segmented-verify-run.outputs.verify_exit_code }}
      timeout_count: ${{ steps.segmented-verify-run.outputs.timeout_count }}
      timeout_segments_json: ${{ steps.segmented-verify-run.outputs.timeout_segments_json }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Common Module Consistency
        run: bash .github/scripts/check-basebackend-common-consistency.sh

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Generate Segmented Verify Plan (JSON)
        id: segmented-plan
        run: |
          PLAN_FILE="segmented-verify-plan-${GITHUB_RUN_ID}.json"
          bash .github/scripts/verify-segmented-ci.sh --json > "${PLAN_FILE}"
          echo "plan_file=${PLAN_FILE}" >> "$GITHUB_OUTPUT"

      - name: Append Segmented Plan Summary
        id: segmented-plan-meta
        run: |
          PLAN_FILE="${{ steps.segmented-plan.outputs.plan_file }}"
          ruby -rjson -e '
            data = JSON.parse(File.read(ARGV[0]))
            segments = data.fetch("segments", [])
            count = segments.length
            first = count.positive? ? segments.first.fetch("id", "N/A") : "N/A"
            last = count.positive? ? segments.last.fetch("id", "N/A") : "N/A"

            File.open(ENV.fetch("GITHUB_STEP_SUMMARY"), "a") do |f|
              f.puts "### Segmented Verify Plan"
              f.puts ""
              f.puts "- count: `#{count}`"
              f.puts "- first: `#{first}`"
              f.puts "- last: `#{last}`"
            end

            File.open(ENV.fetch("GITHUB_OUTPUT"), "a") do |f|
              f.puts "plan_count=#{count}"
              f.puts "plan_first=#{first}"
              f.puts "plan_last=#{last}"
            end
          ' "${PLAN_FILE}"

      - name: Upload Segmented Verify Plan
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: segmented-verify-plan-${{ github.run_id }}
          path: ${{ steps.segmented-plan.outputs.plan_file }}
          retention-days: 14

      - name: Run Segmented Verify (Compile + Test)
        id: segmented-verify-run
        run: |
          set -euo pipefail
          LOG_FILE="segmented-verify-run-${GITHUB_RUN_ID}.log"
          echo "run_log_file=${LOG_FILE}" >> "$GITHUB_OUTPUT"

          set +e
          bash .github/scripts/verify-segmented-ci.sh --timeout 60 | tee "${LOG_FILE}"
          VERIFY_EXIT=${PIPESTATUS[0]}
          set -e

          EXECUTED_COUNT="$(awk -F'|' '/\| *(PASS|FAIL|TIMEOUT) *\|/ {count++} END {print count+0}' "${LOG_FILE}")"
          TIMEOUT_COUNT="$(awk -F'|' '/\| *TIMEOUT *\|/ {count++} END {print count+0}' "${LOG_FILE}")"
          TIMEOUT_SEGMENTS_JSON="$(awk -F'|' '/\| *TIMEOUT *\|/ {id=$1; gsub(/^[[:space:]]+|[[:space:]]+$/, "", id); if (id!="") print id}' "${LOG_FILE}" | ruby -rjson -e 'arr=STDIN.read.lines.map(&:strip).reject(&:empty?); puts JSON.generate(arr)')"
          echo "executed_count=${EXECUTED_COUNT}" >> "$GITHUB_OUTPUT"
          echo "verify_exit_code=${VERIFY_EXIT}" >> "$GITHUB_OUTPUT"
          echo "timeout_count=${TIMEOUT_COUNT}" >> "$GITHUB_OUTPUT"
          {
            echo "timeout_segments_json<<EOF"
            echo "${TIMEOUT_SEGMENTS_JSON}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ "${VERIFY_EXIT}" -ne 0 ]]; then
            exit "${VERIFY_EXIT}"
          fi

      - name: Upload Segmented Verify Run Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: segmented-verify-run-log-${{ github.run_id }}
          path: ${{ steps.segmented-verify-run.outputs.run_log_file }}
          retention-days: 14

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ==========================================
  # 依赖安全扫描（仅 main / PR）
  # ==========================================
  dependency-check:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:aggregate \
            -DfailBuildOnCVSS=9 \
            -DskipTestScope=true \
            -B
        continue-on-error: true

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report/
          retention-days: 30

  # ==========================================
  # 构建各微服务 JAR
  # ==========================================
  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-and-verify]
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service:
          - basebackend-gateway
          - basebackend-user-api
          - basebackend-system-api
          - basebackend-file-service
          - basebackend-notification-service
          - basebackend-observability-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build ${{ matrix.service }}
        run: mvn clean package -pl ${{ matrix.service }} -am -DskipTests -B

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 7

  # ==========================================
  # 总结
  # ==========================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-and-verify, build-services, dependency-check]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Segmented Build & Verify | ${{ needs.build-and-verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Services | ${{ needs.build-services.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Security Scan | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PLAN_COUNT="${{ needs.build-and-verify.outputs.plan_count }}"
          PLAN_FIRST="${{ needs.build-and-verify.outputs.plan_first }}"
          PLAN_LAST="${{ needs.build-and-verify.outputs.plan_last }}"
          PLAN_EXECUTED="${{ needs.build-and-verify.outputs.executed_count }}"
          VERIFY_EXIT_CODE="${{ needs.build-and-verify.outputs.verify_exit_code }}"
          TIMEOUT_COUNT="${{ needs.build-and-verify.outputs.timeout_count }}"
          TIMEOUT_SEGMENTS_JSON="${{ needs.build-and-verify.outputs.timeout_segments_json }}"
          VERIFY_RESULT="${{ needs.build-and-verify.result }}"
          if [[ -z "${PLAN_COUNT}" ]]; then PLAN_COUNT="N/A"; fi
          if [[ -z "${PLAN_FIRST}" ]]; then PLAN_FIRST="N/A"; fi
          if [[ -z "${PLAN_LAST}" ]]; then PLAN_LAST="N/A"; fi
          if [[ -z "${PLAN_EXECUTED}" ]]; then PLAN_EXECUTED="N/A"; fi
          if [[ -z "${VERIFY_EXIT_CODE}" ]]; then VERIFY_EXIT_CODE="N/A"; fi
          if [[ -z "${TIMEOUT_COUNT}" ]]; then TIMEOUT_COUNT="0"; fi
          if [[ -z "${TIMEOUT_SEGMENTS_JSON}" ]]; then TIMEOUT_SEGMENTS_JSON="[]"; fi
          TIMEOUT_SEGMENTS="$(ruby -rjson -e 'arr = JSON.parse(ARGV[0]); puts(arr.empty? ? "none" : arr.join(","))' "${TIMEOUT_SEGMENTS_JSON}")"

          echo "### Segmented Verify Plan (Aggregated)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- count: \`${PLAN_COUNT}\`" >> $GITHUB_STEP_SUMMARY
          echo "- executed: \`${PLAN_EXECUTED}\`" >> $GITHUB_STEP_SUMMARY
          echo "- exit_code: \`${VERIFY_EXIT_CODE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- timeout_count: \`${TIMEOUT_COUNT}\`" >> $GITHUB_STEP_SUMMARY
          echo "- timeout_segments: \`${TIMEOUT_SEGMENTS}\`" >> $GITHUB_STEP_SUMMARY
          echo "- timeout_segments_json: \`${TIMEOUT_SEGMENTS_JSON}\`" >> $GITHUB_STEP_SUMMARY
          echo "- first: \`${PLAN_FIRST}\`" >> $GITHUB_STEP_SUMMARY
          echo "- last: \`${PLAN_LAST}\`" >> $GITHUB_STEP_SUMMARY
          echo "- artifact: \`segmented-verify-plan-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- run log: \`segmented-verify-run-log-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- run: [view artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${TIMEOUT_COUNT}" =~ ^[0-9]+$ ]] && [[ "${TIMEOUT_COUNT}" -gt 0 ]]; then
            echo "> ⚠️ **Timeout detected:** count=\`${TIMEOUT_COUNT}\`, segments=\`${TIMEOUT_SEGMENTS}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${PLAN_COUNT}" =~ ^[0-9]+$ ]] && [[ "${PLAN_EXECUTED}" =~ ^[0-9]+$ ]]; then
            if [[ "${PLAN_COUNT}" -eq "${PLAN_EXECUTED}" ]]; then
              echo "- consistency: ✅ expected(\`${PLAN_COUNT}\`) == executed(\`${PLAN_EXECUTED}\`)" >> $GITHUB_STEP_SUMMARY
            else
              if [[ "${VERIFY_RESULT}" == "success" ]]; then
                echo "> ⚠️ **Plan consistency mismatch:** expected=\`${PLAN_COUNT}\`, executed=\`${PLAN_EXECUTED}\`（job=success）" >> $GITHUB_STEP_SUMMARY
              else
                echo "- consistency: ⚠️ expected(\`${PLAN_COUNT}\`) != executed(\`${PLAN_EXECUTED}\`)（job=\`${VERIFY_RESULT}\`，可能因失败提前停止）" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          else
            echo "- consistency: N/A（缺少 expected 或 executed 数值）" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${PLAN_COUNT}" == "0" ]]; then
            echo "> ⚠️ **Plan count anomaly:** \`plan_count=0\`，本次分段计划为空，请检查分段脚本与参数配置。" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          elif [[ "${PLAN_COUNT}" == "N/A" ]]; then
            echo "> ⚠️ **Plan count unavailable:** 未读取到分段计划摘要，请检查 \`build-and-verify\` job outputs。" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Dependency Security Artifact" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.dependency-check.result }}" == "skipped" ]]; then
            echo "- status: \`skipped\` (仅 main / pull_request 执行)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- artifact: \`dependency-check-report\`" >> $GITHUB_STEP_SUMMARY
            echo "- run: [view artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Gate Policy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- blocking jobs: \`build-and-verify\`, \`build-services\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.dependency-check.result }}" == "failure" ]]; then
            echo "- dependency-check: \`failure\` (non-blocking, because OWASP step uses \`continue-on-error: true\`; please review report artifact manually)" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.dependency-check.result }}" == "skipped" ]]; then
            echo "- dependency-check: \`skipped\` (non-blocking by workflow condition)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- dependency-check: \`${{ needs.dependency-check.result }}\` (non-blocking informational scan)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.build-and-verify.result }}" == "failure" ]] || \
             [[ "${{ needs.build-services.result }}" == "failure" ]]; then
            echo "❌ **CI Failed**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **CI Passed** — Java 25 + Spring Boot 4.0.3" >> $GITHUB_STEP_SUMMARY
          fi
