name: Flyway Database Migration Test

on:
  push:
    branches:
      - main
    paths:
      - '**/db/migration/**'
      - '**/pom.xml'
      - '.github/workflows/flyway-test.yml'
  pull_request:
    branches:
      - main
    paths:
      - '**/db/migration/**'
  workflow_dispatch:

env:
  JAVA_VERSION: '25'

jobs:
  # ==========================================
  # 迁移脚本验证
  # ==========================================
  validate-scripts:
    name: Validate Migration Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate migration scripts naming
        run: |
          echo "检查迁移脚本命名规范..."
          found=false

          for dir in $(find . -path "*/db/migration" -type d -not -path "*/target/*"); do
            echo "📁 检查目录: $dir"
            for file in "$dir"/*.sql; do
              [ -f "$file" ] || continue
              found=true
              basename=$(basename "$file")
              if [[ ! $basename =~ ^V[0-9]+(\.	[0-9]+)*__[a-zA-Z_]+\.sql$ ]] && \
                 [[ ! $basename =~ ^R__[a-zA-Z_]+\.sql$ ]]; then
                echo "❌ 文件命名不符合规范: $basename"
                exit 1
              fi
            done
          done

          if [ "$found" = false ]; then
            echo "⚠️ 未找到迁移脚本"
          else
            echo "✅ 所有迁移脚本命名规范正确"
          fi

      - name: Check for dangerous SQL
        run: |
          echo "检查危险SQL语句..."
          for dir in $(find . -path "*/db/migration" -type d -not -path "*/target/*"); do
            if grep -r "^USE " "$dir" 2>/dev/null; then
              echo "❌ 发现 USE 语句，Flyway 会自动连接到正确的数据库"
              exit 1
            fi
          done
          echo "✅ SQL 检查通过"

  # ==========================================
  # MySQL 迁移测试
  # ==========================================
  test-mysql-migration:
    name: Test MySQL Migration
    runs-on: ubuntu-latest
    needs: validate-scripts

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: basebackend_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Wait for MySQL
        run: sleep 10

      - name: Find and test migrations
        run: |
          FLYWAY_URL="jdbc:mysql://localhost:3306/basebackend_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai"

          # 查找包含迁移脚本的模块
          for dir in $(find . -path "*/db/migration" -type d -not -path "*/target/*"); do
            module=$(echo "$dir" | sed 's|/src/main/resources/db/migration||' | sed 's|^\./||')
            echo "🔄 测试迁移: $module"

            mvn flyway:migrate \
              -Dflyway.url="$FLYWAY_URL" \
              -Dflyway.user=root \
              -Dflyway.password=root \
              -pl "$module" \
              -B || echo "⚠️ $module 迁移跳过（可能无 flyway 插件配置）"
          done

          echo "✅ 迁移测试完成"

  # ==========================================
  # 总结
  # ==========================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [validate-scripts, test-mysql-migration]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## 🗄️ Flyway 迁移测试" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 脚本验证: ${{ needs.validate-scripts.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- MySQL 迁移: ${{ needs.test-mysql-migration.result }}" >> $GITHUB_STEP_SUMMARY
