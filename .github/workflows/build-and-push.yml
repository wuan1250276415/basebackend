name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      services:
        description: '要构建的服务（逗号分隔，留空构建所有）'
        required: false
        default: 'all'

env:
  REGISTRY: docker.io
  REGISTRY_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  JAVA_VERSION: '25'

jobs:
  # ==========================================
  # 准备构建矩阵
  # ==========================================
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Determine services to build
        id: set-matrix
        run: |
          if [[ "${{ github.event.inputs.services }}" == "all" ]] || [[ -z "${{ github.event.inputs.services }}" ]]; then
            echo 'services=["gateway","user-api","system-api","file-service","notification-service","observability-service"]' >> $GITHUB_OUTPUT
          else
            services=$(echo "${{ github.event.inputs.services }}" | jq -R -s -c 'split(",")')
            echo "services=$services" >> $GITHUB_OUTPUT
          fi

      - name: Generate version tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(echo ${GITHUB_SHA} | cut -c1-7)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # ==========================================
  # 构建和推送镜像
  # ==========================================
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: prepare
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.services) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Set module name
        id: module
        run: |
          echo "name=basebackend-${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn clean package -pl ${{ steps.module.outputs.name }} -am -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/basebackend-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.prepare.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.module.outputs.name }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        if: success()
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/basebackend-${{ matrix.service }}:${{ needs.prepare.outputs.version }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ==========================================
  # 构建总结
  # ==========================================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## 🐳 Docker 镜像构建总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: \`${{ needs.prepare.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **服务**: ${{ join(fromJson(needs.prepare.outputs.services), ', ') }}" >> $GITHUB_STEP_SUMMARY
          echo "- **构建状态**: ${{ needs.build-and-push.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.build-and-push.result }}" == "success" ]]; then
            echo "✅ **所有镜像构建成功**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **镜像构建失败**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
