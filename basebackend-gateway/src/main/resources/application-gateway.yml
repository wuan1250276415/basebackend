
spring:
  application:
    name: basebackend-gateway

  main:
    web-application-type: reactive
  cloud:
    # LoadBalancer 配置 - 禁用健康检查
    loadbalancer:
      health-check:
        refetch-instances: false  # 禁用实例健康检查
        refetch-instances-interval: 25s
        repeat-health-check: false  # 禁用重复健康检查
      configurations: default
      cache:
        enabled: false  # 禁用缓存，每次都获取最新实例

    # Sentinel配置
    sentinel:
      # 临时禁用 Sentinel 进行测试
      enabled: false
      transport:
        dashboard: 1.117.67.222:8858  # Sentinel控制台地址
        port: 8719
      eager: true
      # Nacos数据源配置
      datasource:
        # 流控规则
        flow:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            dataId: ${spring.application.name}-flow-rules
            groupId: SENTINEL_GROUP
            rule-type: flow
            username: nacos
            password: nacos
        # 降级规则
        degrade:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            dataId: ${spring.application.name}-degrade-rules
            groupId: SENTINEL_GROUP
            rule-type: degrade
            username: nacos
            password: nacos
        # 网关限流规则
        gw-flow:
          nacos:
            server-addr: ${spring.cloud.nacos.discovery.server-addr}
            dataId: ${spring.application.name}-gw-flow-rules
            groupId: SENTINEL_GROUP
            rule-type: gw-flow
            username: nacos
            password: nacos

    gateway:
      server:
        webflux:
          # 动态路由从Nacos加载
          discovery:
            locator:
              enabled: true  # 启用服务发现
              lower-case-service-id: true  # 服务名小写

          # 显式路由配置
          routes:
            # 用户服务路由
            - id: user-api
              uri: lb://basebackend-user-api
              predicates:
                - Path=/basebackend-user-api/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user

            # 系统服务路由
            - id: system-api
              uri: lb://basebackend-system-api
              predicates:
                - Path=/basebackend-system-api/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: systemServiceCircuitBreaker
                    fallbackUri: forward:/fallback/system

            # 消息管理路由
            - id: messaging-management
              uri: lb://basebackend-system-api
              predicates:
                - Path=/messaging/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: systemServiceCircuitBreaker
                    fallbackUri: forward:/fallback/system

            # 通知服务路由（兼容旧版服务名前缀）
            - id: notification-service-with-prefix
              uri: lb://basebackend-notification-service
              predicates:
                - Path=/basebackend-notification-service/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: notificationServiceCircuitBreaker
                    fallbackUri: forward:/fallback/notification

            # 通知服务 SSE 路由
            # 必须放在通用通知路由前面，避免 /api/notifications/** 先命中
            - id: notification-sse
              uri: lb://basebackend-notification-service
              predicates:
                - Path=/api/notifications/stream
              filters:
                - name: CircuitBreaker
                  args:
                    name: notificationServiceCircuitBreaker

            # 通知服务路由
            - id: notification-service
              uri: lb://basebackend-notification-service
              predicates:
                - Path=/api/notifications/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: notificationServiceCircuitBreaker
                    fallbackUri: forward:/fallback/notification

            # 可观测性服务路由（兼容旧版服务名前缀）
            - id: observability-service-with-prefix
              uri: lb://basebackend-observability-service
              predicates:
                - Path=/basebackend-observability-service/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: observabilityServiceCircuitBreaker
                    fallbackUri: forward:/fallback/observability

            # 可观测性指标路由
            - id: observability-metrics
              uri: lb://basebackend-observability-service
              predicates:
                - Path=/api/metrics/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: observabilityServiceCircuitBreaker
                    fallbackUri: forward:/fallback/observability

            # 可观测性链路追踪路由
            - id: observability-traces
              uri: lb://basebackend-observability-service
              predicates:
                - Path=/api/traces/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: observabilityServiceCircuitBreaker
                    fallbackUri: forward:/fallback/observability

            # 可观测性日志路由
            - id: observability-logs
              uri: lb://basebackend-observability-service
              predicates:
                - Path=/api/logs/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: observabilityServiceCircuitBreaker
                    fallbackUri: forward:/fallback/observability

            # 可观测性告警路由
            - id: observability-alerts
              uri: lb://basebackend-observability-service
              predicates:
                - Path=/api/alerts/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: observabilityServiceCircuitBreaker
                    fallbackUri: forward:/fallback/observability

            # 工单服务路由
            - id: ticket-api
              uri: lb://basebackend-ticket-api
              predicates:
                - Path=/api/ticket/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: ticketServiceCircuitBreaker
                    fallbackUri: forward:/fallback/ticket

            # 商城商品服务路由
            - id: mall-product-api
              uri: lb://basebackend-mall-product-api
              predicates:
                - Path=/api/mall/products/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: mallProductServiceCircuitBreaker
                    fallbackUri: forward:/fallback/mall-product

            # 商城交易服务路由
            - id: mall-trade-api
              uri: lb://basebackend-mall-trade-api
              predicates:
                - Path=/api/mall/trades/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: mallTradeServiceCircuitBreaker
                    fallbackUri: forward:/fallback/mall-trade

            # 商城支付服务路由
            - id: mall-pay-api
              uri: lb://basebackend-mall-pay-api
              predicates:
                - Path=/api/mall/payments/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: mallPayServiceCircuitBreaker
                    fallbackUri: forward:/fallback/mall-pay

            # 文件服务路由
            - id: file-service
              uri: lb://basebackend-file-service
              predicates:
                - Path=/api/files/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: fileServiceCircuitBreaker
                    fallbackUri: forward:/fallback/file

          # 全局CORS配置
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: "*"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowed-headers: "*"
                allow-credentials: false
                max-age: 3600

          # 默认过滤器
          default-filters:
            - AddResponseHeader=X-Response-Default,BaseBackend-Gateway
  # Redis 配置由 Nacos redis-config.yml 通过 spring.config.import 提供，无需在此重复声明

# 熔断器配置
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      userServiceCircuitBreaker:
        baseConfig: default
      systemServiceCircuitBreaker:
        baseConfig: default
      notificationServiceCircuitBreaker:
        baseConfig: default
      observabilityServiceCircuitBreaker:
        baseConfig: default
      fileServiceCircuitBreaker:
        baseConfig: default
      ticketServiceCircuitBreaker:
        baseConfig: default
      mallProductServiceCircuitBreaker:
        baseConfig: default
      mallTradeServiceCircuitBreaker:
        baseConfig: default
      mallPayServiceCircuitBreaker:
        baseConfig: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
    instances:
      userServiceCircuitBreaker:
        baseConfig: default
      systemServiceCircuitBreaker:
        baseConfig: default
      notificationServiceCircuitBreaker:
        baseConfig: default
      observabilityServiceCircuitBreaker:
        baseConfig: default
      fileServiceCircuitBreaker:
        baseConfig: default
      ticketServiceCircuitBreaker:
        baseConfig: default
      mallProductServiceCircuitBreaker:
        baseConfig: default
      mallTradeServiceCircuitBreaker:
        baseConfig: default
      mallPayServiceCircuitBreaker:
        baseConfig: default

# 灰度路由配置
gateway:
  gray:
    enabled: true
    rules: []

# 日志配置
logging:
  level:
    com.basebackend.gateway: DEBUG
    com.alibaba.csp.sentinel: INFO
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Management配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
